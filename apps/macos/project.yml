name: AutopilotApp
options:
  bundleIdPrefix: com.felipe.autopilot
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Assinatura ad-hoc (uso pessoal, sem conta de desenvolvedor)
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
targets:
  AutopilotApp:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
        optional: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Autopilot
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        # Permite acesso a processos/arquivos do usuário (sandbox desligado p/ uso pessoal)
    entitlements:
      path: Sources/AutopilotApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
